<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch chạy xe</title>

<style>
body {
    font-family: -apple-system;
    margin:0;
    background:#f2f2f7;
}

/* HEADER */
.header {
    background:#007AFF;
    color:white;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* CONTROL */
.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:white;
}

input {
    padding:5px;
    width:70px;
}

/* CALENDAR */
.calendar {
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:5px;
    padding:10px;
}

.day {
    background:white;
    border-radius:10px;
    padding:8px;
    text-align:center;
    font-size:12px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.day-number {
    font-weight:bold;
    margin-bottom:5px;
}

/* BUTTONS */
.btn {
    display:block;
    margin:2px 0;
    padding:4px;
    border-radius:6px;
    font-size:11px;
    color:white;
}

.grab { background:#34C759; }
.off { background:#FF3B30; }
.rent { background:#007AFF; }

/* SUMMARY */
.summary {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    box-shadow:0 -2px 5px rgba(0,0,0,0.1);
    text-align:center;
}

.money {
    font-size:20px;
    font-weight:bold;
    color:#007AFF;
}
</style>

</head>

<body>

<div class="header">🚗 Lịch chạy xe</div>

<div class="controls">
    Tháng <input type="number" id="month" min="1" max="12">
    Năm <input type="number" id="year">
    <button onclick="load()">Xem</button>
</div>

<div class="calendar" id="calendar"></div>

<div class="summary">
    Grab: <span id="grab">0</span> |
    Thuê: <span id="rent">0</span><br>
    💰 <span class="money" id="money">0</span> đ
</div>

<script>

function key(m,y){ return `cal-${y}-${m}`; }

function getData(m,y){
    return JSON.parse(localStorage.getItem(key(m,y)) || "{}");
}

function save(m,y,data){
    localStorage.setItem(key(m,y), JSON.stringify(data));
}

function setStatus(day, status){
    let m = month.value, y = year.value;
    let data = getData(m,y);
    data[day] = status;
    save(m,y,data);
    load();
}

function load(){
    let m = month.value, y = year.value;
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let days = new Date(y,m,0).getDate();
    let data = getData(m,y);

    let grab=0, rent=0, money=0;

    for(let d=1; d<=days; d++){
        let s = data[d] || "";

        if(s=="grab"){ grab++; money+=200000; }
        if(s=="rent"){ rent++; money+=500000; }

        let html = `
        <div class="day">
            <div class="day-number">${d}</div>
            <div class="btn grab" onclick="setStatus(${d},'grab')">Grab</div>
            <div class="btn off" onclick="setStatus(${d},'off')">Nghỉ</div>
            <div class="btn rent" onclick="setStatus(${d},'rent')">Thuê</div>
        </div>
`;
        cal.innerHTML += html;
    }

    grab.innerText = grab;
    rent.innerText = rent;
    money.innerText = money.toLocaleString();
}

// mặc định hôm nay
let now = new Date();
month.value = now.getMonth()+1;
year.value = now.getFullYear();

load();

</script>

</body>
</html>
