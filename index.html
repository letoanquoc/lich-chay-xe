<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch chạy xe</title>

<style>
body { font-family:-apple-system; margin:0; background:#f2f2f7;}

.header {
    background:#007AFF;
    color:white;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.controls {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding:10px;
    background:white;
}

input { padding:5px; width:70px;}

button {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#007AFF;
    color:white;
}

.calendar {
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:6px;
    padding:10px;
}

.weekday {
    text-align:center;
    font-weight:bold;
}

.sunday { color:red; }

.day {
    background:white;
    border-radius:10px;
    padding:6px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.today {
    border:2px solid #007AFF;
}

.day-number {
    font-weight:bold;
    margin-bottom:4px;
}

.btn {
    margin:2px 0;
    padding:4px;
    border-radius:6px;
    font-size:11px;
    color:white;
}

.grab { background:#34C759;}
.off { background:#FF3B30;}
.rent { background:#007AFF;}

.active { outline:2px solid black;}

.summary {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    text-align:center;
    box-shadow:0 -2px 5px rgba(0,0,0,0.1);
}

.money { font-size:20px; font-weight:bold; color:#007AFF;}
</style>
</head>

<body>

<div class="header">🚗 Lịch chạy xe</div>

<div class="controls">
    Tháng <input type="number" id="month">
    Năm <input type="number" id="year">
    <button onclick="render()">Xem</button>
    <button onclick="exportData()">💾 Backup</button>
    <input type="file" onchange="importData(event)">
</div>

<div class="calendar" id="calendar"></div>

<div class="summary">
    Grab: <span id="grabCount">0</span> |
    Thuê: <span id="rentCount">0</span><br>
    💰 <span class="money" id="totalMoney">0</span> đ
</div>

<script>

// ===== DATA =====
function key(m,y){ return `cal-${y}-${m}`; }

function getData(m,y){
    return JSON.parse(localStorage.getItem(key(m,y)) || "{}");
}

function save(m,y,data){
    localStorage.setItem(key(m,y), JSON.stringify(data));
}

// ===== SET =====
function setStatus(day, status){
    let m = month.value;
    let y = year.value;

    let data = getData(m,y);
    data[day] = status;
    save(m,y,data);

    render();
}

// ===== RENDER =====
function render(){
    let m = month.value;
    let y = year.value;

    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let today = new Date();
    let days = new Date(y,m,0).getDate();
    let firstDay = new Date(y,m-1,1).getDay();

    let data = getData(m,y);

    let grabCount = 0;
    let rentCount = 0;
    let totalMoney = 0;

    let thu = ["CN","T2","T3","T4","T5","T6","T7"];
// header thứ
    for(let i=0;i<7;i++){
        cal.innerHTML += `<div class="weekday ${i==0?'sunday':''}">${thu[i]}</div>`;
    }

    // ô trống
    for(let i=0;i<firstDay;i++){
        cal.innerHTML += `<div></div>`;
    }

    // ngày
    for(let d=1; d<=days; d++){
        let s = data[d] || "";
        let isToday = (d==today.getDate() && m==today.getMonth()+1 && y==today.getFullYear());

        if(s=="grab"){ grabCount++; totalMoney+=200000; }
        if(s=="rent"){ rentCount++; totalMoney+=500000; }

        let html = `
        <div class="day ${isToday?'today':''}">
            <div class="day-number">${d}</div>
            <div class="btn grab ${s=='grab'?'active':''}" onclick="setStatus(${d},'grab')">Grab</div>
            <div class="btn off ${s=='off'?'active':''}" onclick="setStatus(${d},'off')">Nghỉ</div>
            <div class="btn rent ${s=='rent'?'active':''}" onclick="setStatus(${d},'rent')">Thuê</div>
        </div>
        `;
        cal.innerHTML += html;
    }

    grabCountEl.innerText = grabCount;
    rentCountEl.innerText = rentCount;
    totalMoneyEl.innerText = totalMoney.toLocaleString();
}

// ===== BACKUP =====
function exportData(){
    let allData = {};
    for(let i=0;i<localStorage.length;i++){
        let k = localStorage.key(i);
        if(k.startsWith("cal-")){
            allData[k] = JSON.parse(localStorage.getItem(k));
        }
    }
    let blob = new Blob([JSON.stringify(allData)], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup_lich.json";
    a.click();
}

// ===== IMPORT =====
function importData(event){
    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e){
        let data = JSON.parse(e.target.result);
        for(let k in data){
            localStorage.setItem(k, JSON.stringify(data[k]));
        }
        alert("Khôi phục thành công!");
        render();
    };

    reader.readAsText(file);
}

// ===== DEFAULT =====
let now = new Date();
month.value = now.getMonth()+1;
year.value = now.getFullYear();

let grabCountEl = document.getElementById("grabCount");
let rentCountEl = document.getElementById("rentCount");
let totalMoneyEl = document.getElementById("totalMoney");

render();

</script>

</body>
</html>
