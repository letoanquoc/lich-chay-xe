<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VF5 Pro v26.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --warning: #ff9500; --etc: #5856d6; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: #333; -webkit-tap-highlight-color: transparent; }
        .header { background: #000; color: #fff; text-align: center; padding: 12px; font-weight: bold; position: sticky; top: 0; z-index: 1000; min-height: 20px; }
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd; padding: 5px; position: sticky; top: 44px; z-index: 999; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #888; border-radius: 8px; font-size: 11px; }
        .tab-active { background: var(--primary); color: #fff !important; }
        .card { background: #fff; margin: 10px; padding: 15px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .label-min { font-size: 9px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        input { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 10px; font-weight: bold; font-size: 14px; box-sizing: border-box; text-align: center; }
        .btn-main { width: 100%; padding: 16px; background: var(--success); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f2f2f7; font-size: 13px; align-items: center; }
        .shift-box { background: #f8f9fa; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        
        /* CSS Lịch Thống Kê */
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { background: #fff; border-radius: 8px; padding: 8px 2px; text-align: center; border: 1px solid #eee; font-size: 11px; min-height: 50px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .today { border: 2px solid var(--primary); background: #f0f7ff; }
        .has-data { background: #fafffa; border-color: var(--success); }
        marquee { background: var(--danger); color: #fff; font-size: 12px; padding: 3px; display: block; }
    </style>
</head>
<body>

<div id="app-content">
    <div id="header-alert"></div>
    <div class="header" id="header-title">VF5 PLUS MANAGER</div>
    
    <div class="tab-bar">
        <button id="tabDay" class="tab-btn tab-active" onclick="switchTab('day')">VẬN HÀNH</button>
        <button id="tabMonth" class="tab-btn" onclick="switchTab('month')">THỐNG KÊ</button>
        <button id="tabUser" class="tab-btn" onclick="switchTab('user')">HỒ SƠ XE</button>
    </div>

    <div id="viewDay" class="page">
        <div class="card">
            <h3 id="dayLabel" style="text-align:center; margin:0 0 10px 0; color:var(--primary)">---</h3>
            <div class="shift-box">
                <span class="label-min">CA SÁNG (ODO ĐẦU: <span id="prev-odo">0</span>)</span>
                <input id="am-oe" type="number" placeholder="ODO Cuối Sáng" style="margin-bottom:10px" oninput="liveCalc()">
                <div class="grid-3">
                    <div><label class="label-min">Tr. Sạc</label><input id="am-u1" type="number" oninput="liveCalc()"></div>
                    <div><label class="label-min">S. Sạc</label><input id="am-u2" type="number" oninput="liveCalc()"></div>
                    <div><label class="label-min">Kết ca</label><input id="am-u3" type="number" oninput="liveCalc()"></div>
                </div>
            </div>
            <div class="shift-box" style="border-left-color: var(--etc)">
                <span class="label-min">CA CHIỀU</span>
                <input id="pm-oe" type="number" placeholder="ODO Cuối Chiều" style="margin-bottom:10px" oninput="liveCalc()">
                <div class="grid-3">
                    <div><label class="label-min">Tr. Sạc</label><input id="pm-u1" type="number" oninput="liveCalc()"></div>
                    <div><label class="label-min">S. Sạc</label><input id="pm-u2" type="number" oninput="liveCalc()"></div>
                    <div><label class="label-min">Kết ca</label><input id="pm-u3" type="number" oninput="liveCalc()"></div>
                </div>
            </div>
            <div class="grid-2">
                <div><span class="label-min">Doanh thu:</span><input id="in-inc" type="tel" oninput="formatInp(this); liveCalc()"></div>
                <div><span class="label-min">Phí ETC:</span><input id="in-etc" type="tel" oninput="formatInp(this); liveCalc()"></div>
            </div>
            <div class="card" style="margin:15px 0 0 0; background:#f0f7ff; box-shadow:none; padding:10px">
                <div class="row"><span>Pin đã sạc:</span><b id="res-u">0 %</b></div>
                <div class="row"><span>Tiền điện:</span><b id="res-elec">0 đ</b></div>
                <div class="row" style="border:none"><b>LỢI NHUẬN:</b><b id="res-profit" style="color:var(--primary); font-size:16px">0 đ</b></div>
            </div>
            <button class="btn-main" onclick="saveData()">💾 LƯU DỮ LIỆU</button>
        </div>
    </div>

    <div id="viewMonth" class="page" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <button onclick="changeM(-1)" style="padding:10px; border:none; background:#eee; border-radius:8px">◀</button>
                <b id="calMonthTitle">Tháng ...</b>
                <button onclick="changeM(1)" style="padding:10px; border:none; background:#eee; border-radius:8px">▶</button>
            </div>
            <div id="calendarGrid" class="calendar"></div>
        </div>
        <div class="card">
            <span class="label-min">TỔNG KẾT THÁNG</span>
            <div class="row"><span>Doanh thu:</span><b id="m-inc">0 đ</b></div>
            <div class="row"><span>Tiền điện sạc:</span><b id="m-elec">0 đ</b></div>
            <div class="row"><span>Phí ETC:</span><b id="m-etc">0 đ</b></div>
            <div class="row" style="border:none; color:var(--success); font-size:18px; padding-top:10px">
                <b>LỢI NHUẬN RÒNG:</b><b id="m-total">0 đ</b>
            </div>
        </div>
    </div>

    <div id="viewUser" class="page" style="display:none">
        <div class="card">
            <span class="label-min">HỒ SƠ XE & THỜI HẠN</span>
            <div class="row"><span>Biển số:</span><input id="car-plate" onchange="saveInfo()" style="width:120px; border:none; text-align:right"></div>
            <div class="row"><span>Đăng kiểm:</span><input id="car-reg" type="month" onchange="saveInfo()" style="width:140px"></div>
            <div class="row"><span>Bảo hiểm:</span><input id="car-ins" type="date" onchange="saveInfo()" style="width:140px"></div>
            <button class="btn-main" onclick="checkFine()" style="background:var(--danger); font-size:12px; margin-top:15px">🔍 TRA PHẠT NGUỘI</button>
        </div>
        <button class="btn-main" style="background:#888" onclick="auth.signOut()">ĐĂNG XUẤT</button>
    </div>
</div>

<script>
// --- Cấu hình Firebase của bạn ---
const firebaseConfig = { apiKey: "AIzaSyDY2S9ntLM_PsWiTqsWuTtPXZuZhUGJ7nI", authDomain: "quanlyxe-888d3.firebaseapp.com", databaseURL: "https://quanlyxe-888d3-default-rtdb.firebaseio.com", projectId: "quanlyxe-888d3", storageBucket: "quanlyxe-888d3.firebasestorage.app", appId: "1:862677142675:web:552a2f8636ff77b3ea1166" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

const BAT = 37.23, PRICE = 3858, FREE_DATE = new Date('2027-07-01');
let cD, cM, cY, curU, lastOdo = 0, cloudData = {}, fullData = {};

auth.onAuthStateChanged(user => { if(user) { curU = user; init(); } });

function init() {
    const n = new Date(); cD = n.getDate(); cM = n.getMonth()+1; cY = n.getFullYear();
    sync();
}

async function sync() {
    const snap = await db.ref(`users/${curU.uid}`).get();
    const val = snap.val() || {};
    fullData = val.data || {};
    cloudData = fullData[cY]?.[cM] || {};
    
    // Tìm ODO cuối
    let maxO = 0;
    Object.keys(fullData).forEach(y => Object.keys(fullData[y]).forEach(m => Object.entries(fullData[y][m]).forEach(([day, d]) => {
        if(!(y == cY && m == cM && day == cD)) maxO = Math.max(maxO, d.am?.oe||0, d.pm?.oe||0);
    })));
    lastOdo = maxO;
    document.getElementById('prev-odo').innerText = lastOdo.toLocaleString();

    // Điền dữ liệu ngày hiện tại
    const d = cloudData[cD] || {};
    ['am-oe','am-u1','am-u2','am-u3','pm-oe','pm-u1','pm-u2','pm-u3'].forEach(id => {
        const [shift, field] = id.split('-');
        document.getElementById(id).value = d[shift]?.[field] || '';
    });
    document.getElementById('in-inc').value = (d.inc || 0).toLocaleString();
    document.getElementById('in-etc').value = (d.etc || 0).toLocaleString();

    // Hồ sơ xe
    if(val.info) {
        document.getElementById('car-plate').value = val.info.plate || '';
        document.getElementById('car-reg').value = val.info.reg || '';
        document.getElementById('car-ins').value = val.info.ins || '';
        checkAlerts(val.info);
    }
    
    refreshUI();
}

function liveCalc() {
    const get = id => parseInt(document.getElementById(id).value || 0);
    // Pin sạc = u2 - u1 (Theo yêu cầu của bạn)
    const uCharged = Math.max(0, get('am-u2') - get('am-u1')) + Math.max(0, get('pm-u2') - get('pm-u1'));
    
    const isFree = new Date(cY, cM-1, cD) < FREE_DATE;
    const elecCost = isFree ? 0 : Math.round(uCharged * BAT / 100 * PRICE);
    
    const inc = parseNum(document.getElementById('in-inc').value);
    const etc = parseNum(document.getElementById('in-etc').value);

    document.getElementById('res-u').innerText = uCharged + " %";
    document.getElementById('res-elec').innerText = isFree ? "MIỄN PHÍ" : elecCost.toLocaleString() + " đ";
    document.getElementById('res-profit').innerText = (inc - etc - elecCost).toLocaleString() + " đ";
}

function refreshUI() {
    document.getElementById('dayLabel').innerText = `Ngày ${cD}/${cM}/${cY}`;
    document.getElementById('calMonthTitle').innerText = `Tháng ${cM} / ${cY}`;
    liveCalc();
    if(document.getElementById('viewMonth').style.display !== 'none') renderCalendar();
}

// HÀM VẼ LỊCH (Đã sửa lỗi)
function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const daysInMonth = new Date(cY, cM, 0).getDate();
    const firstDay = new Date(cY, cM - 1, 1).getDay();
    let h = '', sI=0, sE=0, sEtc=0;

    ["CN","T2","T3","T4","T5","T6","T7"].forEach(d => h += `<div style="color:#999; font-size:10px; text-align:center">${d}</div>`);
    for(let i=0; i<firstDay; i++) h += '<div></div>';

    for(let i=1; i<=daysInMonth; i++) {
        const v = cloudData[i] || {};
        const uC = Math.max(0, (v.am?.u2||0)-(v.am?.u1||0)) + Math.max(0, (v.pm?.u2||0)-(v.pm?.u1||0));
        const isFree = new Date(cY, cM-1, i) < FREE_DATE;
        const eC = isFree ? 0 : Math.round(uC * BAT / 100 * PRICE);
        const profit = (v.inc||0) - (v.etc||0) - eC;

        sI += (v.inc||0); sEtc += (v.etc||0); sE += eC;

        const isToday = (i==new Date().getDate() && cM==(new Date().getMonth()+1));
        h += `<div class="day-box ${isToday?'today':''} ${v.inc?'has-data':''}" onclick="goDate(${i})">
                <b>${i}</b>
                <div style="color:var(--success); font-weight:bold">${profit ? (profit/1000).toFixed(0)+'k' : ''}</div>
              </div>`;
    }
    grid.innerHTML = h;
    document.getElementById('m-inc').innerText = sI.toLocaleString() + " đ";
    document.getElementById('m-etc').innerText = sEtc.toLocaleString() + " đ";
    document.getElementById('m-elec').innerText = sE.toLocaleString() + " đ";
    document.getElementById('m-total').innerText = (sI - sEtc - sE).toLocaleString() + " đ";
}

function checkAlerts(i) {
    const today = new Date();
    let msgs = [];
    [{id:'car-reg', n:'Đăng kiểm', v:i.reg, t:'month'}, {id:'car-ins', n:'Bảo hiểm', v:i.ins, t:'date'}].forEach(c => {
        if(!c.v) return;
        const exp = c.t === 'month' ? new Date(c.v + "-28") : new Date(c.v);
        const diff = Math.ceil((exp - today)/(1000*60*60*24));
        if(diff <= 15) msgs.push(`${c.n} còn ${diff} ngày`);
    });
    document.getElementById('header-alert').innerHTML = msgs.length ? `<marquee>⚠️ ${msgs.join(' | ')}</marquee>` : '';
}

async function saveData() {
    const d = {
        am: { oe: getV('am-oe'), u1: getV('am-u1'), u2: getV('am-u2'), u3: getV('am-u3') },
        pm: { oe: getV('pm-oe'), u1: getV('pm-u1'), u2: getV('pm-u2'), u3: getV('pm-u3') },
        inc: parseNum(document.getElementById('in-inc').value),
        etc: parseNum(document.getElementById('in-etc').value)
    };
    await db.ref(`users/${curU.uid}/data/${cY}/${cM}/${cD}`).set(d);
    alert("Đã lưu!"); sync();
}

async function saveInfo() {
    const info = { plate: document.getElementById('car-plate').value.toUpperCase(), reg: document.getElementById('car-reg').value, ins: document.getElementById('car-ins').value };
    await db.ref(`users/${curU.uid}/info`).set(info);
    sync();
}

function switchTab(t) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
    document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = 'block';
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('tab-active');
    refreshUI();
}
function goDate(d) { cD = d; switchTab('day'); }
function changeM(s) { const d = new Date(cY, cM-1+s, 1); cM = d.getMonth()+1; cY = d.getFullYear(); sync(); }
function parseNum(v) { return parseInt(v.toString().replace(/\D/g,'') || 0); }
function formatInp(el) { el.value = parseNum(el.value).toLocaleString(); }
function getV(id) { return parseInt(document.getElementById(id).value || 0); }
function checkFine() {
    const p = document.getElementById('car-plate').value.replace(/[-.]/g,'');
    if(!p) return alert("Nhập biển số!");
    navigator.clipboard.writeText(p); alert("Đã copy biển số!");
    window.open("https://www.csgt.vn/tra-cuu-phuong-tien-vi-pham.html", "_blank");
}
async function handleAuth() {
    const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
    try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { await auth.createUserWithEmailAndPassword(e, p); }
}
</script>
</body>
</html>
